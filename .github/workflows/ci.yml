name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  mcp-build-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:mcp
      - name: Ensure dist/mcp-server.mjs matches source (rebuild it if this fails)
        run: git diff --exit-code dist/mcp-server.mjs

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ignored private files are not tracked
        run: |
          test -z "$(git ls-files wrangler.jsonc PLAN.md .dev.vars .env 2>/dev/null)"
      - name: Scan for local/private deployment markers
        run: |
          ! git grep -nE 'wangyao|zz-b236|/Users/|636eb468' -- ':!package-lock.json' ':!.github/workflows/ci.yml'
